# GitHub Labels Configuration
# 使用 github-label-sync 或类似工具同步标签
# npx github-label-sync --access-token xxx --labels labels.yml owner/repo

labels:
  # Type Labels - 类型标签
  - name: "type:bug"
    color: "d73a4a"
    description: "Bug report - Bug 报告"
  - name: "type:feature"
    color: "a2eeef"
    description: "Feature request - 新功能请求"
  - name: "type:enhancement"
    color: "84b6eb"
    description: "Enhancement or improvement - 功能增强"
  - name: "type:docs"
    color: "0075ca"
    description: "Documentation - 文档相关"
  - name: "type:discussion"
    color: "d4c5f9"
    description: "Discussion topic - 讨论话题"
  - name: "type:refactor"
    color: "fbca04"
    description: "Code refactoring - 代码重构"
  - name: "type:test"
    color: "bfd4f2"
    description: "Test related - 测试相关"
  - name: "type:chore"
    color: "fef2c0"
    description: "Build/toolchain - 构建/工具链"

  # Priority Labels - 优先级标签
  - name: "priority:critical"
    color: "b60205"
    description: "Critical priority - 紧急，需立即处理"
  - name: "priority:high"
    color: "e99695"
    description: "High priority - 高优先级"
  - name: "priority:medium"
    color: "fff8c5"
    description: "Medium priority - 中优先级"
  - name: "priority:low"
    color: "c2e0c6"
    description: "Low priority - 低优先级"

  # Status Labels - 状态标签
  - name: "status:in-review"
    color: "5319e7"
    description: "Currently under review - 审核中"
  - name: "status:needs-review"
    color: "006b75"
    description: "Needs review - 需要审核"
  - name: "status:ready"
    color: "2da44e"
    description: "Ready to be picked up - 可以开始"
  - name: "status:in-progress"
    color: "1d76db"
    description: "Currently being worked on - 进行中"
  - name: "status:blocked"
    color: "e11d21"
    description: "Blocked, cannot proceed - 被阻塞"
  - name: "status:wontfix"
    color: "ffffff"
    description: "Will not be fixed - 不会修复"

  # Area Labels - 模块标签
  - name: "area:cli"
    color: "0366d6"
    description: "Related to CLI - CLI 相关"
  - name: "area:core"
    color: "1f883d"
    description: "Related to core engine - 核心引擎相关"
  - name: "area:web"
    color: "0366d6"
    description: "Related to web UI - Web 界面相关"
  - name: "area:docs"
    color: "0366d6"
    description: "Related to documentation - 文档相关"
  - name: "area:infra"
    color: "0366d6"
    description: "Related to infrastructure - 基础设施相关"

  # Complexity Labels - 复杂度标签
  - name: "complexity:small"
    color: "c5def5"
    description: "Small task (1-2 hours) - 小任务"
  - name: "complexity:medium"
    color: "c2e0c6"
    description: "Medium task (3-5 hours) - 中等任务"
  - name: "complexity:large"
    color: "84b6eb"
    description: "Large task (1-2 days) - 大任务"

  # Special Labels - 特殊标签
  - name: "good first issue"
    color: "7057ff"
    description: "Good for newcomers - 适合新手"
  - name: "help wanted"
    color: "008672"
    description: "Extra attention is needed - 需要帮助"
  - name: "duplicate"
    color: "cfd3d7"
    description: "This issue or PR already exists - 重复"
  - name: "invalid"
    color: "e4e669"
    description: "This doesn't seem right - 无效"
  - name: "breaking-change"
    color: "b60205"
    description: "Breaking change - 破坏性变更"
